name: Deploy dashboard to GitHub Pages

# Publishes public/ on every push to main (including the daily routine's commits),
# so the live site redeploys itself. Data lives in data/ and is mirrored into
# public/ at build time, so the routine only has to update data/*.json.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror data/*.json into public/
        run: cp data/*.json public/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload public/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
